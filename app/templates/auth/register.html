<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GrievanceSys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0f172a] text-gray-200 min-h-screen flex items-center justify-center p-4 py-12">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10 overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-600/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/10 blur-[120px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2 mb-6">
                <div class="bg-purple-600 p-1.5 rounded-lg">
                    <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-400">GrievanceSys</span>
            </a>
            <h1 class="text-2xl font-bold">Create an Account</h1>
            <p class="text-gray-400 mt-2">Join us to streamline grievance redressal</p>
        </div>

        <div class="bg-[#020617] p-8 rounded-2xl border border-gray-800 shadow-2xl">
            {% if error %}
            <div class="mb-6 p-4 bg-red-500/10 border border-red-500/50 rounded-xl flex items-center gap-3 text-red-400 text-sm">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Full Name</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                        <input name="name" type="text" required placeholder="John Doe"
                            class="w-full pl-10 pr-4 py-3 bg-[#0f172a] border border-gray-700 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all text-white">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                        <input name="email" type="email" required placeholder="name@example.com"
                            class="w-full pl-10 pr-4 py-3 bg-[#0f172a] border border-gray-700 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all text-white">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500"></i>
                        <input name="password" type="password" required placeholder="••••••••"
                            class="w-full pl-10 pr-4 py-3 bg-[#0f172a] border border-gray-700 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all text-white">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">I am a...</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="student" checked class="peer hidden">
                            <div class="p-3 text-center border border-gray-700 rounded-xl bg-[#0f172a] peer-checked:border-purple-500 peer-checked:bg-purple-500/10 transition-all text-sm">
                                Student
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="faculty" class="peer hidden">
                            <div class="p-3 text-center border border-gray-700 rounded-xl bg-[#0f172a] peer-checked:border-purple-500 peer-checked:bg-purple-500/10 transition-all text-sm">
                                Faculty
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="staff" class="peer hidden">
                            <div class="p-3 text-center border border-gray-700 rounded-xl bg-[#0f172a] peer-checked:border-purple-500 peer-checked:bg-purple-500/10 transition-all text-sm">
                                Staff
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="officer" class="peer hidden">
                            <div class="p-3 text-center border border-gray-700 rounded-xl bg-[#0f172a] peer-checked:border-purple-500 peer-checked:bg-purple-500/10 transition-all text-sm">
                                Officer
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="admin" class="peer hidden">
                            <div class="p-3 text-center border border-gray-700 rounded-xl bg-[#0f172a] peer-checked:border-purple-500 peer-checked:bg-purple-500/10 transition-all text-sm">
                                Admin
                            </div>
                        </label>
                    </div>
                </div>

                <button class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-xl transition-all transform hover:scale-[1.02] shadow-lg shadow-purple-600/20 active:scale-[0.98]">
                    Register Account
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-gray-800 text-center">
                <p class="text-gray-400">
                    Already have an account? 
                    <a href="/login" class="text-purple-400 font-semibold hover:text-purple-300 transition-colors">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
